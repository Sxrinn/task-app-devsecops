stages:
  - test
  - security
  - build
  - deploy

test:
  image: python:3.11
  stage: test
  script:
    - pip install -r requirements.txt
    - python -m py_compile app.py

security:
  image: python:3.11
  stage: security
  script:
    - pip install safety
    - safety check

build:
  image: docker:latest
  stage: build
  services:
    - docker:dind
  script:
    - docker build -t task-app .

deploy:
  stage: deploy
  script:
    - echo "Déploiement sur serveur de test (VM ou cloud)"